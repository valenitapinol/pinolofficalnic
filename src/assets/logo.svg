  <rect x="75" y="145" width="50" height="30" fill="#374151" rx="3"/>
  <circle cx="85" cy="155" r="3" fill="#dc2626"/>
  <circle cx="105" cy="155" r="3" fill="#dc2626"/>
  <circle cx="125" cy="155" r="3" fill="#dc2626"/>
  
